<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Đăng nhập</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,101,132,0.1);
      border: 1px solid rgba(255,101,132,0.25);
      color: var(--accent2);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 { font-size: 2rem; margin-bottom: 8px; }

    .subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 0.9rem; }

    .input-group { position: relative; }

    .input-group input { padding-left: 44px; }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .eye-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
    }

    .eye-toggle:hover { color: var(--text); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="container" style="max-width:420px">
    <div class="card">
      <div class="admin-badge">🔐 Admin Panel</div>
      <h1>Đăng nhập</h1>
      <p class="subtitle">Chỉ dành cho quản trị viên</p>

      <div class="form-group">
        <label>Tên đăng nhập</label>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="admin" autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-group">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" id="passInput" />
          <button class="eye-toggle" type="button" onclick="togglePass()" id="eyeBtn">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="loginBtn" onclick="login()">
        Đăng nhập
      </button>

      <a href="/" class="back-link">← Về trang chính</a>
    </div>
  </div>

  <script src="../utils.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin/dashboard';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    function togglePass() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      if (!username || !password) { showToast('Vui lòng nhập đầy đủ!', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Đang đăng nhập...';

      try {
        const data = await api('/admin/login', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminUsername', data.username);
        showToast('Đăng nhập thành công!', 'success');
        setTimeout(() => window.location.href = '/admin/dashboard', 600);
      } catch (e) {
        showToast(e.message || 'Sai thông tin đăng nhập!', 'error');
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
      }
    }
  </script>
</body>
</html>
